# Development environment - includes hot reload support for all services

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: codematrix-postgres
    environment:
      POSTGRES_USER: codematrix
      POSTGRES_PASSWORD: codematrix-password
      POSTGRES_DB: codematrix
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - codematrix-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codematrix"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: codematrix-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - codematrix-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # Backend API Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: codematrix-backend-dev
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://codematrix:codematrix-password@postgres:5432/codematrix
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PLUGINS_DIR: /app/plugins
      DEBUG: "true"
      LOG_LEVEL: debug
    ports:
      - "3001:3001"
      - "9229:9229"
    volumes:
      - ./backend/src:/app/src:ro
      - ./backend/plugins:/app/plugins
      - /app/node_modules
    networks:
      - codematrix-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: ["npm", "run", "dev"]
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Webview UI
  webview:
    build:
      context: ./webview-ui
      dockerfile: Dockerfile.dev
    container_name: codematrix-webview-dev
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:3001
      VITE_WS_URL: ws://localhost:3001
    ports:
      - "5173:5173"
      - "5174:5174"
    volumes:
      - ./webview-ui/src:/app/src:ro
      - ./webview-ui/public:/app/public:ro
      - /app/node_modules
    networks:
      - codematrix-network
    depends_on:
      - backend
    restart: unless-stopped
    command: ["npm", "run", "dev"]

  # VS Code Extension (for development)
  extension:
    build:
      context: ./extensions
      dockerfile: Dockerfile.dev
    container_name: codematrix-extension-dev
    environment:
      NODE_ENV: development
      BACKEND_URL: http://backend:3001
    ports:
      - "3000:3000"
    volumes:
      - ./extensions/src:/app/src:ro
      - /app/node_modules
    networks:
      - codematrix-network
    depends_on:
      - backend
    restart: unless-stopped
    command: ["npm", "run", "dev"]

volumes:
  postgres_data:
  redis_data:

networks:
  codematrix-network:
    driver: bridge